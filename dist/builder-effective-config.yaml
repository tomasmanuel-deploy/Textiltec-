directories:
  output: dist
  buildResources: build
appId: com.prakash.billing
productName: Prakash Billing System
files:
  - filter:
      - package.json
      - node_modules/**/*
      - .next/**/*
      - public/**/*
      - electron/**/*
      - assets/**/*
      - data/series.json
      - data/system.json
      - data/agt_keys/**/*
      - data/agt_config.json
mac:
  target: dmg
  icon: build/icons/icon.icns
  category: public.app-category.business
  hardenedRuntime: true
  gatekeeperAssess: false
win:
  target: nsis
  icon: build/icons/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Prakash Billing
  runAfterFinish: true
linux:
  target: AppImage
  icon: build/icons/icon.png
electronVersion: 39.0.0
