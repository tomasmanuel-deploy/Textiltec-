<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prakash License Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 600px;
            margin: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 8px;
        }
        
        .header p {
            color: #718096;
            font-size: 16px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-group label {
            display: block;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .key-selector {
            display: flex;
            gap: 12px;
            align-items: end;
        }
        
        .key-selector input {
            flex: 1;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-secondary {
            background: #f7fafc;
            color: #4a5568;
            border: 2px solid #e2e8f0;
        }
        
        .btn-secondary:hover {
            background: #edf2f7;
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .result {
            margin-top: 32px;
            padding: 24px;
            background: #f7fafc;
            border-radius: 12px;
            border-left: 4px solid #48bb78;
        }
        
        .result h3 {
            color: #2d3748;
            margin-bottom: 16px;
            font-size: 18px;
        }
        
        .license-key {
            background: #2d3748;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 8px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 12px;
            word-break: break-all;
            margin-bottom: 16px;
        }
        
        .details {
            font-size: 14px;
            color: #4a5568;
        }
        
        .details div {
            margin-bottom: 4px;
        }
        
        .error {
            background: #fed7d7;
            border-left-color: #f56565;
            color: #c53030;
        }
        
        .actions {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }
        
        .actions .btn {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 License Generator</h1>
            <p>Generate cryptographically signed license keys for Prakash</p>
        </div>
        
        <form id="licenseForm">
            <div class="form-group">
                <label for="privateKey">Private Key File</label>
                <div class="key-selector">
                    <input type="text" id="privateKeyPath" placeholder="Select private key file..." readonly>
                    <button type="button" class="btn btn-secondary" id="selectKeyBtn">Browse</button>
                </div>
            </div>
            
            <div class="form-group">
                <label for="duration">License Duration</label>
                <select id="duration">
                    <option value="week">1 Week</option>
                    <option value="month">1 Month</option>
                    <option value="year">1 Year</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="product">Product ID</label>
                <input type="text" id="product" value="com.example.prakash" required>
            </div>
            
            <div class="form-group">
                <label for="issuer">Issuer Name</label>
                <input type="text" id="issuer" value="Prakash Licensing" required>
            </div>

            <div class="form-group">
                <label for="machineCode">Computer Code (from Prakash)</label>
                <input type="text" id="machineCode" placeholder="XXXX-XXXX-XXXX-..." required>
            </div>
            
            <div class="actions">
                <button type="submit" class="btn btn-primary" id="generateBtn">Generate License Key</button>
            </div>
        </form>
        
        <div id="result" style="display: none;"></div>
    </div>
    
    <script src="renderer.js"></script>
</body>
</html>
